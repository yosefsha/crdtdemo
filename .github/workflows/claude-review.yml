name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1.0.2
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--allowedTools mcp__github_comment__update_claude_comment,mcp__github_pr__get_pr_details,mcp__github_pr__get_pr_comments"
          prompt: |
            Review this pull request. Focus on:
            - TypeScript type errors or unsafe casts
            - CRDT correctness (timestamp ordering, merge idempotency)
            - Logic bugs in shared/crdt/database/ or server sync endpoints
            - Missing error handling at system boundaries
            Post a concise comment with findings grouped by severity (blocking / suggestion). If nothing significant is found, say so briefly.
