name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]  

permissions:
  contents: write       
  pull-requests: write  
  issues: write        
  actions: read        

jobs:
  review:
    runs-on: ubuntu-latest
    # Removed the job-level permissions block so it inherits the robust top-level ones
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        env:
          # Explicitly exposing the tokens as env variables for the gh CLI / internal scripts
          GH_TOKEN: ${{ secrets.GH_PAT }} 
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GH_PAT }}
          show_full_output: true
          prompt: |
            Review this pull request. Focus on:
            - TypeScript type errors or unsafe casts
            - CRDT correctness (timestamp ordering, merge idempotency)
            - Logic bugs in shared/crdt/database/ or server sync endpoints
            - Missing error handling at system boundaries
            Post a concise comment with findings grouped by severity (blocking / suggestion). If nothing significant is found, say so briefly.